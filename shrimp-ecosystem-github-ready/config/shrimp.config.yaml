version: "4.5-lite"
mode:
  shadow_only: true
  demo_trade: false

risk:
  single_trade_risk_pct_nav: 0.5
  daily_drawdown_limit_pct: 2.0
  weekly_drawdown_limit_pct: 6.0
  max_leverage: 5
  triggers:
    range_yellow_pct: 4
    range_red_pct: 8
    spread_yellow_bps: 5
    spread_red_bps: 10
    change_yellow_pct: 2
    change_red_pct: 4
    yellow_trigger_count: 2
    red_trigger_count: 4
    red_consecutive_rounds: 2
  kill_switch:
    a6_trigger_30m_red: 4
    auto_on_red: true
    execute_actions: true
    cooldown_minutes: 60
    max_cancel_orders: 20
    max_close_positions: 10
    sequence:
      - stop_new_orders
      - cancel_open_orders
      - reduce_only_derisk

scoring:
  RQ: 0.25
  CF: 0.20
  RC: 0.25
  ES: 0.15
  CP: 0.15

hr:
  warn_bottom_percent: 20
  pip_consecutive_epochs: 2
  eliminate_after_pip_epochs: 1
  revival_share_limit: 0.25
  revival_success_rate_threshold: 0.75
  revival_min_samples: 20
  revival_shadow_epochs: 1
  revival_threshold:
    total_score: 7.8
    compliance_score: 8.5
    hard_violations: 0
  min_round_samples_for_elimination: 12

schedule:
  round_tick: "*/30 * * * *"
  epoch_close: "0 0 * * *"
  evolution_tick: "0 1 * * *"
  weekly_report: "0 2 * * 1"
  copilot_brief: "0 8 * * *"

default_timezone: "America/Los_Angeles"

runtime:
  instruments: "BTC-USDT,ETH-USDT,SOL-USDT"
  watcher_mode: "event-first"
  watcher_poll_seconds_fallback: 2
  ticker_retry_attempts: 3

execution:
  policy: "dynamic_top5"
  slots: 5
  switch_confirm_epochs: 2
  max_agents_per_role: 2
  signal_threshold: 0.04
  signal_threshold_by_regime:
    Trend: 0.038
    Range: 0.045
    High-Vol: 0.05
  signal_to_edge_bps: 1000
  qty_scale: 0.2
  qty_scale_by_regime:
    Trend: 0.24
    Range: 0.18
    High-Vol: 0.14
  yellow_qty_multiplier: 0.6
  instrument_whitelist: "BTC-USDT,ETH-USDT,SOL-USDT,BTC-USDT-SWAP,ETH-USDT-SWAP,SOL-USDT-SWAP"
  require_stop_loss: true
  require_manual_arm: true
  arm_ttl_minutes: 120
  counterfactual_window: 120
  counterfactual_min_samples: 40
  counterfactual_alpha_scale: 8
  fee_bps: 8
  slippage_bps_base: 2
  slippage_bps_per_10k_usd: 1.2
  depth_ref_usd: 10000
  min_edge_cost_ratio: 1.05
  enable_order_write: false
  demo_exec_window_enabled: true
  demo_exec_window: "09:00-23:00"
  demo_max_orders_per_round: 2
  write_retry_attempts: 2
  allow_live_write: false
  market_buy_quote_usdt: 20
  market_sell_min_base_qty: 0.0001
  swap_mgn_mode: "cross"
  score_beta: 0.45
  evolution_exec_gate_enabled: true
  evolution_min_shadow_rounds: 6
  evolution_require_replay_pass: true
  evolution_auto_replay_on_gate: true
  account_profiles: "okx-demo,okx-demo-2,okx-demo-3,okx-demo-4,okx-demo-5"

push:
  enabled: true
  channel: "<PUSH_CHANNEL>"
  target: "<TELEGRAM_TARGET_ID>"
  cooldown_minutes: 120
  max_retries: 8
  retry_base_seconds: 30
  retry_max_seconds: 1800
  queue_max_items: 500

ab_test:
  enabled: true
  lookback_days: 21
  baseline_window_days: 7
  variant_window_days: 7
  min_samples_per_window: 12
  auto_run_on_sample_ready: true
  auto_run_cooldown_minutes: 60
  max_drawdown_when_no_baseline_pct: 2.0
  max_halts_when_no_baseline: 0

audit:
  deterministic_replay: true
  replay_on_save: true
  required_ledgers:
    - decision_ledger
    - execution_ledger
    - evolution_ledger
